# docker-compose.yml
# For local development + testing before pushing to Vultr
#
# Usage:
#   docker-compose up --build

version: "3.9"

services:
  mediexplain:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env                  # Loads all your secrets from .env
    volumes:
      - ./app:/app/app        # Hot-reload: changes to app/ reflect immediately
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
